name: USD/JPY Daily Signal Check

on:
  schedule:
    # 22:00 UTC = 06:00 SGT (Tokyo open)
    - cron: "0 22 * * 0-4"
    # 14:30 UTC = 22:30 SGT (NY/London overlap)
    - cron: "30 14 * * 1-5"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run signal check
        env:
          OANDA_API_KEY:      ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID:   ${{ secrets.OANDA_ACCOUNT_ID }}
          OANDA_ENV:          ${{ secrets.OANDA_ENV }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          BOT_MODE:           ${{ secrets.BOT_MODE }}
        run: python main.py --once

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
